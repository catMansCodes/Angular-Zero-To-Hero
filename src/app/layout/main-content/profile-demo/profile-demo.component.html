<main class="content">
    <div class="content-card">
        <h2 class="h4 fw-bold text-danger mb-3">
            <i class="fa fa-user me-2" aria-hidden="true"></i>Routing demo — profile
        </h2>
        <p class="text-muted small mb-4">
            Values below update from the URL: path parameters, query string, and matrix parameters on
            <code>/profile</code>.
        </p>
        <div class="row g-3">
            <div class="col-12 col-md-6">
                <div class="border border-secondary-subtle rounded-3 p-3 bg-body-tertiary small">
                    <div class="fw-semibold text-danger mb-2">Path params</div>
                    <pre class="mb-0 font-monospace text-break">{{ pathParams() | json }}</pre>
                </div>
            </div>
            <div class="col-12 col-md-6">
                <div class="border border-secondary-subtle rounded-3 p-3 bg-body-tertiary small">
                    <div class="fw-semibold text-danger mb-2">Query params</div>
                    <pre class="mb-0 font-monospace text-break">{{ queryParams() | json }}</pre>
                </div>
            </div>
        </div>
        <a routerLink="/routing" class="btn btn-danger mt-4">
            <i class="fa fa-arrow-left me-2" aria-hidden="true"></i>Back to Routing
        </a>
    </div>
</main>
